<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
    <title>HomeAITuber</title>
    <link rel="stylesheet" crossorigin href="./assets/main-QEkl09-0.css">
    <script>localStorage.removeItem("modelInfo");localStorage.setItem("wsUrl",JSON.stringify("ws://"+location.host+"/client-ws"));localStorage.setItem("baseUrl",JSON.stringify(location.origin))</script>
    <script type="module" crossorigin src="./assets/main-nu7uwxNJ.js"></script>
    <script>
      // ═══════════════════════════════════════════════════════════
      //  HomeAITuber Ribbon v1 — top bar, no bottom overlay
      // ═══════════════════════════════════════════════════════════
      (function() {
        // ── state ──
        let graphicsEnabled = true;
        let radioWs = null;
        let _radioReconnectDelay = 1000;
        let dropdownOpen = null; // 'lang' | 'mood' | 'history' | null
        let recentSegments = [];
        const MAX_RECENT = 5;

        let currentMode = localStorage.getItem('ha-mode') || 'radio';
        let currentLanguage = localStorage.getItem('ha-language') || 'en-jp';
        let currentMood = localStorage.getItem('ha-mood') || '';

        const MODES = [
          { id: 'chat',       label: '💬 Chat' },
          { id: 'radio',      label: '📻 Radio' },
          { id: 'radio-chat', label: '🎙️ Radio+Chat' },
        ];
        const LANGS = [
          { id: 'en',         label: '🇬🇧 EN',       desc: '英語のみ' },
          { id: 'jp',         label: '🇯🇵 JP',       desc: '日本語のみ' },
          { id: 'en-jp',      label: '🔁 EN→JP',   desc: '英→日' },
          { id: 'en-jp-note', label: '📖 EN→JP→解説', desc: '解説付き' },
          { id: 'mixed',      label: '🎲 Mix',       desc: '混合' },
        ];
        const MOODS = [
          { id: '',          label: 'auto',        emoji: '🎭' },
          { id: 'chaotic',   label: 'chaotic',     emoji: '🤪' },
          { id: 'chill',     label: 'chill',       emoji: '😌' },
          { id: 'brisk',     label: 'brisk',       emoji: '⚡' },
          { id: 'thoughtful',label: 'thoughtful',  emoji: '🤔' },
        ];

        function persist() {
          localStorage.setItem('ha-mode', currentMode);
          localStorage.setItem('ha-language', currentLanguage);
          localStorage.setItem('ha-mood', currentMood);
        }

        // ── CSS injection for top spacing ──
        function ensureTopMargin() {
          if (document.getElementById('ha-top-margin')) return;
          const s = document.createElement('style');
          s.id = 'ha-top-margin';
          s.textContent = 'body { padding-top: 36px !important; }';
          document.head.appendChild(s);
        }

        // ── Live2D visibility ──
        function setLive2DVisible(visible) {
          graphicsEnabled = visible;
          document.querySelectorAll('canvas').forEach(el => {
            el.style.visibility = visible ? 'visible' : 'hidden';
          });
          document.querySelectorAll('[class*="live2d"], [id*="live2d"], [class*="Live2D"]').forEach(el => {
            el.style.display = visible ? '' : 'none';
          });
          const btn = document.getElementById('ha-gfx-btn');
          if (btn) {
            btn.textContent = visible ? '🖼️' : '🎧';
            btn.style.background = visible ? 'rgba(78,204,163,0.25)' : 'rgba(255,107,107,0.25)';
            btn.style.color = visible ? '#4ecca3' : '#ff6b6b';
          }
        }

        // ── Radio WS ──
        function connectRadioWS() {
          const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
          const wsUrl = `${proto}//${window.location.host}/radio-ws`;
          try {
            radioWs = new WebSocket(wsUrl);
            radioWs.onopen = () => {
              _radioReconnectDelay = 1000;
              updateStatus('connected');
            };
            radioWs.onmessage = (event) => {
              try {
                const msg = JSON.parse(event.data);
                if (msg.type === 'radio-segment' && msg.segment) {
                  addRecentSegment(msg.segment);
                  showRadioOverlay(msg.segment);
                } else if (msg.type === 'audio' && msg.audio) {
                  playRadioAudio(msg);
                } else if (msg.type === 'state-sync') {
                  if (msg.mode) { currentMode = msg.mode; persist(); updateUI(); }
                  if (msg.language) { currentLanguage = msg.language; persist(); updateUI(); }
                } else if (msg.type === 'mode-changed') {
                  currentMode = msg.mode; persist(); updateUI();
                } else if (msg.type === 'language-changed') {
                  currentLanguage = msg.language; persist(); updateUI();
                } else if (msg.type === 'pong') {}
              } catch(e) {}
            };
            radioWs.onclose = () => {
              updateStatus('reconnecting');
              const delay = Math.min(_radioReconnectDelay * 2, 30000);
              _radioReconnectDelay = delay;
              setTimeout(connectRadioWS, delay);
            };
            radioWs.onerror = () => updateStatus('error');
          } catch(e) {
            updateStatus('error');
            setTimeout(connectRadioWS, 30000);
          }
        }

        function sendCmd(cmd) {
          if (radioWs && radioWs.readyState === WebSocket.OPEN) {
            radioWs.send(JSON.stringify(cmd));
          }
        }

        function fireRadio() {
          sendCmd({ type: 'request-radio', mood: currentMood || null });
          const btn = document.getElementById('ha-fire-btn');
          if (btn) { btn.style.transform = 'scale(0.9)'; setTimeout(() => btn.style.transform = '', 150); }
        }

        function setMode(mode) {
          if (mode === currentMode) return;
          currentMode = mode; persist(); updateUI();
          sendCmd({ type: 'set-mode', mode });
        }

        function setLanguage(lang) {
          if (lang === currentLanguage) return;
          currentLanguage = lang; persist(); updateUI();
          sendCmd({ type: 'set-language', language: lang });
        }

        function setMood(mood) {
          currentMood = mood; persist(); updateUI();
        }

        function updateUI() {
          // Mode tabs
          document.querySelectorAll('#ha-mode-tabs .ha-rb-tab').forEach(b => {
            b.classList.toggle('active', b.dataset.mode === currentMode);
          });
          // Language label
          const langBtn = document.getElementById('ha-lang-btn');
          if (langBtn) {
            const l = LANGS.find(x => x.id === currentLanguage) || LANGS[2];
            langBtn.textContent = l.label;
          }
          // Mood label
          const moodBtn = document.getElementById('ha-mood-btn');
          if (moodBtn) {
            const m = MOODS.find(x => x.id === currentMood) || MOODS[0];
            moodBtn.textContent = m.emoji + ' ' + m.label;
          }
          // Status
          const stat = document.getElementById('ha-status-dot');
          if (stat) stat.className = 'ha-rb-dot ' + (_statusState || 'error');
        }

        let _statusState = 'error';
        function updateStatus(state) {
          _statusState = state;
          const dot = document.getElementById('ha-status-dot');
          if (dot) dot.className = 'ha-rb-dot ' + state;
        }

        function toggleDropdown(id) {
          if (dropdownOpen === id) { closeDropdowns(); return; }
          closeDropdowns();
          dropdownOpen = id;
          const dd = document.getElementById('ha-dd-' + id);
          if (dd) dd.style.display = 'block';
        }

        function closeDropdowns() {
          dropdownOpen = null;
          document.querySelectorAll('.ha-rb-dropdown').forEach(d => d.style.display = 'none');
        }

        // ── Segments ──
        function addRecentSegment(seg) {
          recentSegments.unshift(seg);
          if (recentSegments.length > MAX_RECENT) recentSegments.pop();
          renderHistoryDD();
        }

        function renderHistoryDD() {
          const list = document.getElementById('ha-history-list');
          if (!list) return;
          if (recentSegments.length === 0) {
            list.innerHTML = '<div style="color:#666;font-size:11px;padding:8px;">まだありません</div>';
            return;
          }
          list.innerHTML = recentSegments.map(seg => `
            <div style="padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.06);">
              <div style="color:#4ecca3;font-size:11px;">${esc(seg.en||'').substring(0,50)}${(seg.en||'').length>50?'…':''}</div>
              <div style="color:#ffd93d;font-size:10px;">${esc(seg.jp||'').substring(0,60)}</div>
              <div style="display:flex;justify-content:space-between;margin-top:2px;">
                <span style="color:#666;font-size:9px;">${seg.mood||'?'}</span>
              </div>
            </div>
          `).join('');
        }

        function showRadioOverlay(seg) {
          const old = document.getElementById('ha-radio-overlay');
          if (old) old.remove();
          const moodColors = { chaotic: '#ff6b6b', chill: '#a8d8ea', brisk: '#4ecca3', thoughtful: '#ffd93d' };
          const mc = moodColors[seg.mood] || '#4ecca3';
          const overlay = document.createElement('div');
          overlay.id = 'ha-radio-overlay';
          overlay.innerHTML = `
            <div style="background:#16213e;border:2px solid ${mc};border-radius:12px;padding:12px 16px;max-width:92vw;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,0.6);">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                <span style="color:${mc};font-weight:700;font-size:10px;">📻 ${seg.mood||'brisk'}</span>
                <span style="color:#888;font-size:9px;">${new Date().toLocaleTimeString()}</span>
              </div>
              <div style="color:#4ecca3;font-size:13px;line-height:1.4;">${esc(seg.en||'')}</div>
              <div style="color:#ffd93d;font-size:12px;line-height:1.4;">${esc(seg.jp||'')}</div>
              <div style="color:#a8d8ea;font-size:11px;font-style:italic;">${esc(seg.en_repeat||'')}</div>
              ${seg.phrase ? `<div style="margin-top:4px;padding-top:4px;border-top:1px solid #0f3460;color:#ff6b9d;font-size:11px;">💡 ${esc(seg.phrase)} — ${esc(seg.note||'')}</div>` : ''}
            </div>
          `;
          overlay.style.cssText = 'position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:9998;animation:haFadeIn 0.3s ease;pointer-events:none;width:100%;max-width:500px;';
          document.body.appendChild(overlay);
          setTimeout(() => { overlay.style.opacity = '0'; overlay.style.transition = 'opacity 0.8s'; setTimeout(() => overlay.remove(), 800); }, 25000);
        }

        function esc(text) {
          if (!text) return '';
          const d = document.createElement('div');
          d.textContent = text;
          return d.innerHTML;
        }

        // ── Audio ──
        let _radioAudioQueue = [], _radioAudioPlaying = false;
        function playRadioAudio(msg) {
          try {
            const bytes = new Uint8Array(atob(msg.audio).split('').map(c => c.charCodeAt(0)));
            const url = URL.createObjectURL(new Blob([bytes], { type: 'audio/wav' }));
            _radioAudioQueue.push(url);
            _playNextInQueue();
          } catch(e) { console.warn('[HA] Audio decode:', e); }
        }
        function _playNextInQueue() {
          if (_radioAudioPlaying || _radioAudioQueue.length === 0) return;
          _radioAudioPlaying = true;
          const url = _radioAudioQueue.shift();
          const a = new Audio(url);
          a.play().catch(() => { URL.revokeObjectURL(url); _radioAudioPlaying = false; _playNextInQueue(); });
          a.onended = () => { URL.revokeObjectURL(url); _radioAudioPlaying = false; setTimeout(_playNextInQueue, 200); };
        }

        // ── Chat interception ──
        function interceptChatWebSocket() {
          const origSend = WebSocket.prototype.send;
          const targetHost = new URL(window.location.origin).host;
          WebSocket.prototype.send = function(data) {
            if (this.url && this.url.includes(targetHost)) {
              try {
                const msg = JSON.parse(typeof data === 'string' ? data : new TextDecoder().decode(data));
                if (msg.type === 'text-input' && msg.text && radioWs && radioWs.readyState === WebSocket.OPEN) {
                  radioWs.send(JSON.stringify({ type: 'comment', text: msg.text, source: 'chat' }));
                }
              } catch(e) {}
            }
            return origSend.call(this, data);
          };
        }

        // ── Tab visibility ──
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState !== 'visible') return;
          if (!radioWs || radioWs.readyState > 1) connectRadioWS();
        });

        // ── Click outside closes dropdowns ──
        document.addEventListener('click', (e) => {
          if (!e.target.closest('.ha-rb-dd-trigger') && !e.target.closest('.ha-rb-dropdown')) {
            closeDropdowns();
          }
        });

        // ── Build ribbon ──
        function buildRibbon() {
          if (document.getElementById('ha-ribbon')) return;
          ensureTopMargin();

          const ribbon = document.createElement('div');
          ribbon.id = 'ha-ribbon';
          ribbon.innerHTML = `
            <style>
              @keyframes haFadeIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
              #ha-ribbon { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
              #ha-ribbon * { box-sizing: border-box; }
              .ha-rb-bar {
                position: fixed; top: 0; left: 0; right: 0; z-index: 10000;
                height: 36px;
                background: rgba(15,15,30,0.96);
                backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
                border-bottom: 1px solid rgba(78,204,163,0.3);
                display: flex; align-items: center;
                padding: 0 8px; gap: 4px;
                box-shadow: 0 1px 12px rgba(0,0,0,0.4);
              }
              .ha-rb-tabs { display: flex; gap: 2px; margin-right: auto; }
              .ha-rb-tab {
                padding: 4px 10px; border: none; border-radius: 6px;
                background: transparent; color: #999;
                font-size: 11px; font-weight: 600; cursor: pointer;
                transition: all 0.15s; white-space: nowrap;
              }
              .ha-rb-tab:active { transform: scale(0.95); }
              .ha-rb-tab.active { background: rgba(78,204,163,0.2); color: #4ecca3; }
              .ha-rb-btn {
                padding: 3px 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
                background: rgba(255,255,255,0.04); color: #ccc;
                font-size: 10px; font-weight: 600; cursor: pointer;
                transition: all 0.15s; white-space: nowrap;
                min-width: 32px; text-align: center;
              }
              .ha-rb-btn:active { transform: scale(0.95); }
              .ha-rb-btn.fire { background: rgba(255,107,157,0.15); border-color: rgba(255,107,157,0.3); color: #ff6b9d; font-size: 15px; padding: 1px 10px; }
              .ha-rb-btn.gfx { font-size: 14px; padding: 2px 8px; }
              .ha-rb-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 2px; flex-shrink: 0; }
              .ha-rb-dot.connected { background: #4ecca3; }
              .ha-rb-dot.reconnecting { background: #ffd93d; }
              .ha-rb-dot.error { background: #ff6b6b; }
              .ha-rb-dropdown {
                display: none; position: fixed; top: 36px;
                z-index: 10001;
                background: rgba(15,15,30,0.98);
                backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
                border: 1px solid rgba(78,204,163,0.2);
                border-radius: 0 0 8px 8px;
                padding: 6px; min-width: 140px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.5);
                max-height: 70vh; overflow-y: auto;
              }
              .ha-rb-dd-item {
                padding: 6px 10px; border-radius: 6px; cursor: pointer;
                color: #ccc; font-size: 11px; transition: background 0.1s;
                white-space: nowrap;
              }
              .ha-rb-dd-item:hover { background: rgba(78,204,163,0.12); }
              .ha-rb-dd-item.active { color: #4ecca3; background: rgba(78,204,163,0.18); }
              @media (max-width: 400px) {
                .ha-rb-tab { padding: 4px 6px; font-size: 10px; }
                .ha-rb-btn { padding: 2px 6px; font-size: 9px; }
                .ha-rb-btn.fire { font-size: 13px; padding: 1px 8px; }
              }
            </style>
            <div class="ha-rb-bar" id="ha-rb-bar">
              <span class="ha-rb-dot error" id="ha-status-dot" title="未接続"></span>
              <div class="ha-rb-tabs" id="ha-mode-tabs"></div>
              <button class="ha-rb-btn ha-rb-dd-trigger" id="ha-lang-btn" onclick="event.stopPropagation();toggleDropdown('lang')">🔁 EN→JP</button>
              <button class="ha-rb-btn ha-rb-dd-trigger" id="ha-mood-btn" onclick="event.stopPropagation();toggleDropdown('mood')">🎭 auto</button>
              <button class="ha-rb-btn gfx" id="ha-gfx-btn" onclick="event.stopPropagation();setLive2DVisible(!graphicsEnabled)">🖼️</button>
              <button class="ha-rb-btn fire" id="ha-fire-btn" onclick="event.stopPropagation();fireRadio()">📻</button>
              <button class="ha-rb-btn ha-rb-dd-trigger" onclick="event.stopPropagation();toggleDropdown('history')" title="履歴">📜</button>
            </div>
            <!-- Language dropdown -->
            <div class="ha-rb-dropdown" id="ha-dd-lang" style="right:200px;"></div>
            <!-- Mood dropdown -->
            <div class="ha-rb-dropdown" id="ha-dd-mood" style="right:140px;"></div>
            <!-- History dropdown -->
            <div class="ha-rb-dropdown" id="ha-dd-history" style="right:40px;min-width:220px;">
              <div id="ha-history-list" style="font-size:11px;">
                <div style="color:#666;font-size:11px;padding:8px;">まだありません</div>
              </div>
            </div>
          `;
          document.body.appendChild(ribbon);

          // Build mode tabs
          const tabs = document.getElementById('ha-mode-tabs');
          MODES.forEach(m => {
            const b = document.createElement('button');
            b.className = 'ha-rb-tab'; b.dataset.mode = m.id; b.textContent = m.label;
            b.title = m.id === 'chat' ? 'チャット' : m.id === 'radio' ? 'ラジオ' : 'ラジオ+チャット';
            b.addEventListener('click', (e) => { e.stopPropagation(); setMode(m.id); });
            tabs.appendChild(b);
          });

          // Build language dropdown
          const langDD = document.getElementById('ha-dd-lang');
          LANGS.forEach(l => {
            const div = document.createElement('div');
            div.className = 'ha-rb-dd-item'; div.textContent = l.label + ' ' + l.desc;
            div.addEventListener('click', (e) => { e.stopPropagation(); setLanguage(l.id); closeDropdowns(); });
            langDD.appendChild(div);
          });

          // Build mood dropdown
          const moodDD = document.getElementById('ha-dd-mood');
          MOODS.forEach(m => {
            const div = document.createElement('div');
            div.className = 'ha-rb-dd-item'; div.textContent = m.emoji + ' ' + m.label;
            div.addEventListener('click', (e) => { e.stopPropagation(); setMood(m.id); closeDropdowns(); });
            moodDD.appendChild(div);
          });

          updateUI();
        }

        // ── Init ──
        function init() {
          buildRibbon();
          connectRadioWS();
          interceptChatWebSocket();
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', () => setTimeout(init, 500));
        } else {
          setTimeout(init, 500);
        }

        const obs = new MutationObserver(() => {
          if (document.querySelector('canvas') && !graphicsEnabled) setLive2DVisible(false);
        });
        obs.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
