<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>HomeAITuber</title>
    <link rel="stylesheet" crossorigin href="./assets/main-QEkl09-0.css">
    <script>localStorage.removeItem("modelInfo");localStorage.setItem("wsUrl",JSON.stringify("ws://"+location.host+"/client-ws"));localStorage.setItem("baseUrl",JSON.stringify(location.origin))</script>
    <script type="module" crossorigin src="./assets/main-nu7uwxNJ.js"></script>
    <script>
      // ═══════════════════════════════════════════════════════════
      //  HomeAITuber Ribbon v2 — slim bar + settings drawer
      // ═══════════════════════════════════════════════════════════
      (function() {
        // ── Dynamic viewport height ──
        function setDVH() {
          document.documentElement.style.setProperty('--dvh', window.innerHeight * 0.01 + 'px');
        }
        setDVH();
        window.addEventListener('resize', setDVH);
        window.addEventListener('orientationchange', () => setTimeout(setDVH, 100));

        // ── Inject fix CSS ──
        function injectFixCSS() {
          if (document.getElementById('ha-fix-css')) return;
          const s = document.createElement('style');
          s.id = 'ha-fix-css';
          s.textContent = `
            :root { --ribbon-h: 40px; }
            body { padding-top: var(--ribbon-h) !important; }
            .cs-main-container, #root {
              height: calc(var(--dvh, 1vh) * 100) !important;
            }
          `;
          document.head.appendChild(s);
        }

        // ── state ──
        let graphicsEnabled = true;
        let radioWs = null;
        let _radioReconnectDelay = 1000;
        let settingsOpen = false;
        let recentSegments = [];
        const MAX_RECENT = 5;

        let currentMode = localStorage.getItem('ha-mode') || 'radio';
        let currentLanguage = localStorage.getItem('ha-language') || 'en-jp';
        let currentMood = localStorage.getItem('ha-mood') || '';

        const MODES = [
          { id: 'chat',       icon: '💬', label: 'Chat' },
          { id: 'radio',      icon: '📻', label: 'Radio' },
          { id: 'radio-chat', icon: '🎙️', label: 'Radio+Chat' },
        ];
        const LANGS = [
          { id: 'en',         label: '🇬🇧 ENのみ' },
          { id: 'jp',         label: '🇯🇵 JPのみ' },
          { id: 'en-jp',      label: '🔁 EN→JP' },
          { id: 'en-jp-note', label: '📖 EN→JP→解説' },
          { id: 'mixed',      label: '🎲 混合' },
        ];
        const MOODS = [
          { id: '',          label: '🎭 auto' },
          { id: 'chaotic',   label: '🤪 chaotic' },
          { id: 'chill',     label: '😌 chill' },
          { id: 'brisk',     label: '⚡ brisk' },
          { id: 'thoughtful',label: '🤔 thoughtful' },
        ];

        function persist() {
          localStorage.setItem('ha-mode', currentMode);
          localStorage.setItem('ha-language', currentLanguage);
          localStorage.setItem('ha-mood', currentMood);
        }

        // ── Live2D ──
        function setLive2DVisible(visible) {
          graphicsEnabled = visible;
          document.querySelectorAll('canvas').forEach(el => {
            el.style.visibility = visible ? 'visible' : 'hidden';
          });
          document.querySelectorAll('[class*="live2d"], [id*="live2d"], [class*="Live2D"]').forEach(el => {
            el.style.display = visible ? '' : 'none';
          });
          const btn = document.getElementById('ha-gfx-toggle');
          if (btn) {
            btn.classList.toggle('off', !visible);
            btn.textContent = visible ? '🖼️ Graphics ON' : '🎧 Graphics OFF';
          }
        }

        // ── Radio WS ──
        function connectRadioWS() {
          const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
          const wsUrl = `${proto}//${window.location.host}/radio-ws`;
          try {
            radioWs = new WebSocket(wsUrl);
            radioWs.onopen = () => { _radioReconnectDelay = 1000; updateStatus('connected'); };
            radioWs.onmessage = (event) => {
              try {
                const msg = JSON.parse(event.data);
                if (msg.type === 'radio-segment' && msg.segment) { addRecentSegment(msg.segment); showRadioOverlay(msg.segment); }
                else if (msg.type === 'audio' && msg.audio) playRadioAudio(msg);
                else if (msg.type === 'state-sync') { if (msg.mode) { currentMode=msg.mode;persist();updateUI(); } if (msg.language) { currentLanguage=msg.language;persist();updateUI(); } }
                else if (msg.type === 'mode-changed') { currentMode=msg.mode;persist();updateUI(); }
                else if (msg.type === 'language-changed') { currentLanguage=msg.language;persist();updateUI(); }
              } catch(e) {}
            };
            radioWs.onclose = () => { updateStatus('reconnecting'); setTimeout(connectRadioWS, Math.min(_radioReconnectDelay*2,30000)); };
            radioWs.onerror = () => updateStatus('error');
          } catch(e) { updateStatus('error'); setTimeout(connectRadioWS, 30000); }
        }

        function sendCmd(cmd) { if (radioWs&&radioWs.readyState===WebSocket.OPEN) radioWs.send(JSON.stringify(cmd)); }
        function fireRadio() { sendCmd({type:'request-radio',mood:currentMood||null}); flashBtn('ha-fire-btn'); }
        function setMode(m) { if(m===currentMode)return; currentMode=m;persist();updateUI();sendCmd({type:'set-mode',mode:m}); }
        function setLanguage(l) { if(l===currentLanguage)return; currentLanguage=l;persist();updateUI();sendCmd({type:'set-language',language:l}); }
        function setMood(m) { currentMood=m;persist();updateUI(); }

        function flashBtn(id) { const b=document.getElementById(id); if(b){b.style.transform='scale(0.9)';setTimeout(()=>b.style.transform='',150);} }

        function updateUI() {
          document.querySelectorAll('#ha-mode-tabs .ha-tab').forEach(b => b.classList.toggle('active', b.dataset.mode===currentMode));
          // Update settings drawer
          document.querySelectorAll('#ha-settings .ha-lang-opt').forEach(b => b.classList.toggle('active', b.dataset.lang===currentLanguage));
          document.querySelectorAll('#ha-settings .ha-mood-opt').forEach(b => b.classList.toggle('active', b.dataset.mood===currentMood));
        }

        let _statusState='error';
        function updateStatus(s) { _statusState=s; const d=document.getElementById('ha-status-dot'); if(d)d.className='ha-dot '+s; }

        function toggleSettings() {
          settingsOpen = !settingsOpen;
          const drawer = document.getElementById('ha-settings');
          drawer.classList.toggle('open', settingsOpen);
        }

        // ── Segments ──
        function addRecentSegment(seg) { recentSegments.unshift(seg); if(recentSegments.length>MAX_RECENT)recentSegments.pop(); renderHistory(); }
        function renderHistory() {
          const el = document.getElementById('ha-history-list');
          if(!el)return;
          el.innerHTML = recentSegments.length===0
            ? '<div style="color:#555;font-size:11px;padding:8px;">まだありません</div>'
            : recentSegments.map(seg=>`<div style="padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);"><div style="color:#4ecca3;font-size:11px;">${esc(seg.en||'').substring(0,45)}${(seg.en||'').length>45?'…':''}</div><div style="color:#ffd93d;font-size:10px;">${esc(seg.jp||'').substring(0,55)}</div></div>`).join('');
        }

        function showRadioOverlay(seg) {
          const old=document.getElementById('ha-radio-overlay'); if(old)old.remove();
          const mc={chaotic:'#ff6b6b',chill:'#a8d8ea',brisk:'#4ecca3',thoughtful:'#ffd93d'}[seg.mood]||'#4ecca3';
          const d=document.createElement('div'); d.id='ha-radio-overlay';
          d.innerHTML=`<div style="background:#16213e;border:2px solid ${mc};border-radius:12px;padding:12px 16px;max-width:90vw;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,0.6);"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="color:${mc};font-weight:700;font-size:10px;">📻 ${seg.mood||'?'}</span><span style="color:#888;font-size:9px;">${new Date().toLocaleTimeString()}</span></div><div style="color:#4ecca3;font-size:13px;line-height:1.4;">${esc(seg.en||'')}</div><div style="color:#ffd93d;font-size:12px;">${esc(seg.jp||'')}</div><div style="color:#a8d8ea;font-size:11px;font-style:italic;">${esc(seg.en_repeat||'')}</div>${seg.phrase?`<div style="margin-top:4px;padding-top:4px;border-top:1px solid #0f3460;color:#ff6b9d;font-size:11px;">💡 ${esc(seg.phrase)} — ${esc(seg.note||'')}</div>`:''}</div>`;
          d.style.cssText='position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:9998;animation:haFadeIn 0.3s ease;pointer-events:none;width:100%;max-width:500px;';
          document.body.appendChild(d);
          setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity 0.8s';setTimeout(()=>d.remove(),800);},25000);
        }

        function esc(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

        // ── Audio ──
        let _q=[],_playing=false;
        function playRadioAudio(msg){try{const b=new Uint8Array(atob(msg.audio).split('').map(c=>c.charCodeAt(0)));_q.push(URL.createObjectURL(new Blob([b],{type:'audio/wav'})));_next();}catch(e){}}
        function _next(){if(_playing||_q.length===0)return;_playing=true;const u=_q.shift();const a=new Audio(u);a.play().catch(()=>{URL.revokeObjectURL(u);_playing=false;_next();});a.onended=()=>{URL.revokeObjectURL(u);_playing=false;setTimeout(_next,200);};}

        // ── Chat interception ──
        function interceptChatWS(){const o=WebSocket.prototype.send,h=new URL(location.origin).host;WebSocket.prototype.send=function(d){if(this.url&&this.url.includes(h)){try{const m=JSON.parse(typeof d==='string'?d:new TextDecoder().decode(d));if(m.type==='text-input'&&m.text&&radioWs&&radioWs.readyState===WebSocket.OPEN)radioWs.send(JSON.stringify({type:'comment',text:m.text,source:'chat'}));}catch(e){}}return o.call(this,d);};}

        document.addEventListener('visibilitychange',()=>{if(document.visibilityState!=='visible')return;if(!radioWs||radioWs.readyState>1)connectRadioWS();});

        // ── Build UI ──
        function build() {
          if(document.getElementById('ha-ribbon'))return;
          injectFixCSS();

          const el=document.createElement('div');el.id='ha-ribbon';
          el.innerHTML=`
            <style>
              @keyframes haFadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
              #ha-ribbon{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
              #ha-ribbon *{box-sizing:border-box}
              .ha-bar{position:fixed;top:0;left:0;right:0;z-index:10000;height:40px;background:rgba(12,12,28,0.96);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid rgba(78,204,163,0.25);display:flex;align-items:center;padding:0 8px;gap:4px;box-shadow:0 1px 8px rgba(0,0,0,0.5)}
              .ha-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin:0 2px}
              .ha-dot.connected{background:#4ecca3;box-shadow:0 0 6px rgba(78,204,163,0.4)}
              .ha-dot.reconnecting{background:#ffd93d}
              .ha-dot.error{background:#ff6b6b}
              .ha-tabs{display:flex;gap:2px;margin-right:auto}
              .ha-tab{padding:6px 10px;border:none;border-radius:7px;background:transparent;color:#888;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap}
              .ha-tab:active{transform:scale(0.95)}
              .ha-tab.active{background:rgba(78,204,163,0.18);color:#4ecca3}
              .ha-gear{padding:6px 10px;border:1px solid rgba(255,255,255,0.12);border-radius:7px;background:transparent;color:#ccc;font-size:16px;cursor:pointer;transition:all 0.15s;line-height:1}
              .ha-gear:active{transform:scale(0.95)}
              .ha-gear.open{background:rgba(78,204,163,0.15);border-color:rgba(78,204,163,0.3)}
              .ha-drawer{position:fixed;top:40px;right:0;z-index:10001;width:260px;max-height:calc(100dvh - 40px);overflow-y:auto;background:rgba(12,12,28,0.98);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-left:1px solid rgba(78,204,163,0.2);border-bottom:1px solid rgba(78,204,163,0.2);border-radius:0 0 0 12px;padding:10px 12px;display:none;box-shadow:-2px 4px 16px rgba(0,0,0,0.5);-webkit-overflow-scrolling:touch}
              .ha-drawer.open{display:block}
              .ha-section{margin-bottom:10px}
              .ha-section-title{color:#888;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;padding-left:2px}
              .ha-opt{padding:8px 10px;border-radius:6px;cursor:pointer;color:#ccc;font-size:11px;transition:background 0.1s;margin-bottom:2px}
              .ha-opt:active{background:rgba(78,204,163,0.15)}
              .ha-opt.active{color:#4ecca3;background:rgba(78,204,163,0.12);font-weight:600}
              .ha-opt.fire{background:rgba(255,107,157,0.12);color:#ff6b9d;font-weight:700;text-align:center;font-size:14px;margin-top:4px}
              .ha-opt.gfx.off{color:#ff6b6b}
              .ha-opt.sep{border-top:1px solid rgba(255,255,255,0.06);margin-top:4px;padding-top:10px}
              .ha-history{max-height:180px;overflow-y:auto;-webkit-overflow-scrolling:touch}
            </style>
            <div class="ha-bar">
              <span class="ha-dot error" id="ha-status-dot"></span>
              <div class="ha-tabs" id="ha-mode-tabs"></div>
              <button class="ha-gear" id="ha-gear-btn" onclick="event.stopPropagation();toggleSettings()">⚙️</button>
            </div>
            <div class="ha-drawer" id="ha-settings">
              <div class="ha-section">
                <div class="ha-section-title">🌐 Language</div>
                <div id="ha-lang-opts"></div>
              </div>
              <div class="ha-section">
                <div class="ha-section-title">🎭 Mood</div>
                <div id="ha-mood-opts"></div>
              </div>
              <div class="ha-section">
                <div class="ha-section-title">🖼️ Display</div>
                <div class="ha-opt gfx" id="ha-gfx-toggle" onclick="event.stopPropagation();setLive2DVisible(!graphicsEnabled)">🖼️ Graphics ON</div>
              </div>
              <div class="ha-section">
                <div class="ha-opt fire sep" id="ha-fire-btn" onclick="event.stopPropagation();fireRadio()">📻 ラジオ発火</div>
              </div>
              <div class="ha-section">
                <div class="ha-section-title">📜 最近のラジオ</div>
                <div class="ha-history" id="ha-history-list">
                  <div style="color:#555;font-size:11px;padding:8px;">まだありません</div>
                </div>
              </div>
            </div>
          `;
          document.body.appendChild(el);

          // Mode tabs
          const tabs=document.getElementById('ha-mode-tabs');
          MODES.forEach(m=>{const b=document.createElement('button');b.className='ha-tab';b.dataset.mode=m.id;b.textContent=m.icon+' '+m.label;b.addEventListener('click',e=>{e.stopPropagation();setMode(m.id);});tabs.appendChild(b);});

          // Language opts
          const lo=document.getElementById('ha-lang-opts');
          LANGS.forEach(l=>{const d=document.createElement('div');d.className='ha-opt ha-lang-opt';d.dataset.lang=l.id;d.textContent=l.label;d.addEventListener('click',e=>{e.stopPropagation();setLanguage(l.id);});lo.appendChild(d);});

          // Mood opts
          const mo=document.getElementById('ha-mood-opts');
          MOODS.forEach(m=>{const d=document.createElement('div');d.className='ha-opt ha-mood-opt';d.dataset.mood=m.id;d.textContent=m.label;d.addEventListener('click',e=>{e.stopPropagation();setMood(m.id);});mo.appendChild(d);});

          updateUI();

          // Close drawer on outside click
          document.addEventListener('click',e=>{if(settingsOpen&&!e.target.closest('#ha-ribbon'))toggleSettings();});
        }

        function init(){build();connectRadioWS();interceptChatWS();}
        if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>setTimeout(init,500));else setTimeout(init,500);

        const obs=new MutationObserver(()=>{if(document.querySelector('canvas')&&!graphicsEnabled)setLive2DVisible(false);});
        obs.observe(document.body,{childList:true,subtree:true});
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
