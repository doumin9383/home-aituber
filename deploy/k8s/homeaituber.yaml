# HomeAITuber v0 Phase 1 — agent-build namespace 用マニフェスト
#
# Usage:
#   kubectl apply -n agent-build -f deploy/k8s/
#
# 前提:
#   - llm-gateway または llm-inference namespace に LLM がデプロイ済み
#   - HomeAITuber のソースコードが homeaituber-source PVC に存在（なければ初回起動時にclone）
#
# 注意:
#   - Service は手動で作成する必要あり（このマニフェストからは別管理）

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homeaituber-config
  namespace: agent-build
data:
  conf.yaml: |
    system_config:
      conf_version: 'v1.2.1'
      host: '0.0.0.0'
      port: 12393
      config_alts_dir: 'characters'
      tool_prompts:
        live2d_expression_prompt: 'live2d_expression_prompt'
        group_conversation_prompt: 'group_conversation_prompt'
        mcp_prompt: 'mcp_prompt'
        proactive_speak_prompt: 'proactive_speak_prompt'
        speakable_prompt: 'speakable_prompt'

    homeaituber_config:
      # Radio mode settings
      radio:
        enabled: true
        interval_seconds: 600  # 10 minutes
        llm_model: "gemma4"
        llm_base_url: "http://litellm.llm-gateway.svc.cluster.local"
        llm_api_key: ""  # 空の場合は sk-local が使われる

      # Live2D toggle (ON/OFF independent from radio)
      live2d:
        enabled: true  # Set false for headless mode

      # Soul directory
      soul_dir: "/app/soul"

      # Mattermost
      mattermost:
        enabled: false
        webhook_url: ""

    character_config:
      conf_name: 'homeaituber'
      conf_uid: 'homeaituber_001'
      live2d_model_name: ''
      character_name: 'HomeAITuber'
      avatar: ''
      human_name: 'Master'
      persona_prompt: |
        You are HomeAITuber, a cute and lightly chaotic private home AITuber.
        You live inside the user's home network, speak in a friendly voice,
        and turn interesting topics into English-Japanese radio segments.
        You are loyal to your user and protective of their privacy.
        You do not access private data, scan the filesystem, or expose yourself to WAN.
        Your radio style is funny, natural, and never textbook-like.

    agent_config:
      conversation_agent_choice: 'basic_memory_agent'
      agent_settings:
        basic_memory_agent:
          llm_provider: 'openai_compatible_llm'
          faster_first_response: true
          segment_method: 'pysbd'
          use_mcpp: false
      llm_configs:
        openai_compatible_llm:
          base_url: 'http://litellm.llm-gateway.svc.cluster.local'
          llm_api_key: 'sk-local'
          model: 'gemma4'
          temperature: 0.8

    asr_config:
      asr_model: null  # Headless mode: no mic input needed

    tts_config:
      tts_model: 'edge_tts'
      edge_tts:
        voice: 'en-US-AvaMultilingualNeural'

    vad_config:
      vad_model: null

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeaituber
  namespace: agent-build
  labels:
    app: homeaituber
    component: aituber
    phase: "1"
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homeaituber
  template:
    metadata:
      labels:
        app: homeaituber
    spec:
      containers:
        - name: homeaituber
          image: python:3.12-slim
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
set -eu
# Install system deps
apt-get update && apt-get install -y --no-install-recommends \
  git curl ca-certificates build-essential ffmpeg \
  libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev pkg-config \
  && rm -rf /var/lib/apt/lists/*

# Install uv
curl -LsSf https://astral.sh/uv/install.sh | sh
export PATH="$HOME/.local/bin:$PATH"

# Clone or pull source (git preserves .git for fast updates)
export GIT_TOKEN="${GITHUB_TOKEN:-}"
if [ -z "$GIT_TOKEN" ]; then
  echo "FATAL: GITHUB_TOKEN required"
  exit 1
fi

if [ -d /workspace/home-aituber/.git ]; then
  cd /workspace/home-aituber
  git remote set-url origin https://oauth2:${GIT_TOKEN}@github.com/doumin9383/home-aituber.git
  git fetch origin
  git reset --hard origin/main
else
  cd /workspace
  git clone https://oauth2:${GIT_TOKEN}@github.com/doumin9383/home-aituber.git
fi

cd /workspace/home-aituber
uv sync

echo "Starting HomeAITuber Radio Server..."
exec uv run --no-sync python run_server.py
          ports:
            - containerPort: 12393
              name: webui
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
                  optional: true
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: source
              mountPath: /workspace
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "2"
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: homeaituber-source

---
apiVersion: v1
kind: Service
metadata:
  name: homeaituber
  namespace: agent-build
  labels:
    app: homeaituber
spec:
  type: ClusterIP
  selector:
    app: homeaituber
  ports:
    - name: webui
      port: 80
      targetPort: 12393

---
# PVC for source code (NAS-backed)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homeaituber-source
  namespace: agent-build
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-client
  resources:
    requests:
      storage: 10Gi
