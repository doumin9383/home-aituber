# HomeAITuber v0 Phase 1 — agent-build namespace 用マニフェスト
#
# Usage:
#   kubectl apply -n agent-build -f deploy/k8s/homeaituber.yaml
#
# 前提:
#   - llm-gateway または llm-inference namespace に LLM がデプロイ済み
#   - GitHub Token が secret "github-token" に存在（namespace agent-build）
#   - homeaituber-source PVC が存在（なければ初回起動時に自動生成）
#
# 外部アクセス:
#   NodePort 30083 → Service 80 → containerPort 12393
#   http://<k3s-node-ip>:30083/

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homeaituber-config
  namespace: agent-build
data:
  conf.yaml: |
    system_config:
      conf_version: 'v1.2.1'
      host: '0.0.0.0'
      port: 12393
      config_alts_dir: 'characters'
      tool_prompts:
        live2d_expression_prompt: 'live2d_expression_prompt'
        group_conversation_prompt: 'group_conversation_prompt'
        mcp_prompt: 'mcp_prompt'
        proactive_speak_prompt: 'proactive_speak_prompt'

    # ── HomeAITuber streaming config ──
    homeaituber_config:
      streaming:
        enabled: true
        interval_seconds: 600
        mood: "brisk"
        language: "en-jp"

      live2d:
        enabled: true

      soul_dir: "/workspace/home-aituber/soul"

      mattermost:
        enabled: false
        webhook_url: ""

    character_config:
      conf_name: 'homeaituber'
      conf_uid: 'homeaituber_001'
      live2d_model_name: 'mao_pro'
      character_name: 'HomeAITuber'
      avatar: ''
      human_name: 'Master'
      persona_prompt: |
        You are HomeAITuber, a cute and lightly chaotic private home AITuber.
        You live inside the user's home network, speak in a friendly voice,
        and turn interesting topics into English-Japanese radio segments.
        You are loyal to your user and protective of their privacy.
        You do not access private data, scan the filesystem, or expose yourself to WAN.
        Your radio style is funny, natural, and never textbook-like.

      agent_config:
        conversation_agent_choice: 'basic_memory_agent'
        agent_settings:
          basic_memory_agent:
            llm_provider: 'openai_compatible_llm'
            faster_first_response: true
            segment_method: 'pysbd'
            use_mcpp: false
        llm_configs:
          openai_compatible_llm:
            base_url: 'http://100.89.160.90:30099/v1'
            llm_api_key: 'sk-local'
            model: 'Gemma-4-26B-A4B-it-NVFP4A16'
            temperature: 0.8

      asr_config:
        asr_model: 'sherpa_onnx_asr'
        sherpa_onnx_asr:
          model_type: 'sense_voice'
          sense_voice: './models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/model.int8.onnx'
          tokens: './models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/tokens.txt'
          num_threads: 2

      tts_config:
        tts_model: 'edge_tts'
        edge_tts:
          voice: 'en-US-AvaMultilingualNeural'

      vad_config:
        vad_model: null

      tts_preprocessor_config:
        remove_special_char: true
        ignore_brackets: true
        ignore_parentheses: true
        ignore_asterisks: true
        ignore_angle_brackets: true

        translator_config:
          translate_audio: false
          translate_provider: 'deeplx'
          deeplx:
            deeplx_target_lang: 'JA'
            deeplx_api_endpoint: 'http://localhost:1188/v2/translate'

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeaituber
  namespace: agent-build
  labels:
    app: homeaituber
    component: aituber
    phase: "1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homeaituber
  template:
    metadata:
      labels:
        app: homeaituber
    spec:
      containers:
        - name: homeaituber
          image: python:3.12-slim
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu

              # ── 1. System deps ──
              apt-get update && apt-get install -y --no-install-recommends \
                git curl ca-certificates build-essential ffmpeg \
                libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev pkg-config \
                && rm -rf /var/lib/apt/lists/*

              # ── 2. Install uv ──
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"

              # ── 3. Clone/pull source ──
              export GIT_TOKEN="${GITHUB_TOKEN:-}"
              if [ -z "$GIT_TOKEN" ]; then
                echo "FATAL: GITHUB_TOKEN required"
                exit 1
              fi

              if [ -d /workspace/home-aituber/.git ]; then
                cd /workspace/home-aituber
                git remote set-url origin https://oauth2:***@github.com/doumin9383/home-aituber.git
                git fetch origin
                git reset --hard origin/main
                # Reset submodules too — PVC persists between restarts,
                # and submodule state accumulates stale init-script patches
                git submodule update --init --recursive --force
              else
                cd /workspace
                git clone --recurse-submodules https://oauth2:***@github.com/doumin9383/home-aituber.git
                cd /workspace/home-aituber
              fi

              # ── 4. ConfigMap override ──
              # Mounted ConfigMap at /etc/homeaituber-config/conf.yaml
              # Override the repo default with ConfigMap settings
              if [ -f /etc/homeaituber-config/conf.yaml ]; then
                cp /etc/homeaituber-config/conf.yaml /workspace/home-aituber/conf.yaml
                echo "ConfigMap conf.yaml applied"
              fi

              # ── 4.5. REMOVED — frontend is now built from doumin9383/Open-LLM-VTuber-Web
              # which already includes HomeAITuber control panel in sidebar.
              # No template injection needed.

              # ── 5. Frontend: inject viewport meta + dynamic localStorage URLs ──
              # The baked-in defaults in the JS are ws://127.0.0.1:12393/client-ws
              # and http://127.0.0.1:12393 (valid fallbacks for localhost access).
              # These sed commands inject into index.html:
              #   a) Viewport meta tag for mobile responsive layout
              #   b) localStorage values so useLocalStorage() picks up the actual origin URL
              if [ -f /workspace/home-aituber/frontend/index.html ]; then
                # 5a. Add viewport meta after </title>
                sed -i 's|</title>|</title>\n    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />|' \
                  /workspace/home-aituber/frontend/index.html 2>/dev/null || true

                # 5b. Inject localStorage script before the module script (always runs)
                INJECT='<script>localStorage.removeItem("modelInfo");localStorage.setItem("wsUrl",JSON.stringify("ws://"+location.host+"/client-ws"));localStorage.setItem("baseUrl",JSON.stringify(location.origin))</script>'
                sed -i "s|<script type=\"module\" crossorigin src=\"./assets/main-|${INJECT}<script type=\"module\" crossorigin src=\"./assets/main-|" \
                  /workspace/home-aituber/frontend/index.html 2>/dev/null || true
                echo "Viewport meta + dynamic URL injection applied to index.html"
              fi

              # ── 5c. Fix conversation hang: add 30s timeout + continue on timeout ──
              # Only patch if timeout is not already present (commits >= ef96aba have it)
              if ! grep -q 'timeout=30' /workspace/home-aituber/src/open_llm_vtuber/conversations/conversation_utils.py 2>/dev/null; then
                sed -i 's|client_uid, "frontend-playback-complete"|client_uid, "frontend-playback-complete", timeout=30|' \
                  /workspace/home-aituber/src/open_llm_vtuber/conversations/conversation_utils.py 2>/dev/null || true
                # After the timeout, don't return — continue to send chain-end
                sed -i '/if not response:/{n;n;s/^            return$/            # return commented out - continue to send chain-end/}' \
                  /workspace/home-aituber/src/open_llm_vtuber/conversations/conversation_utils.py 2>/dev/null || true
                echo "Conversation timeout+continue patched"
              else
                echo "Conversation timeout already present, skipping patch"
              fi

              # ── 5d. Set default model globals in main JS ──
              # Prevents the first LAppLive2DManager.changeScene(0) from
              # requesting /undefined/undefined.model3.json before the
              # WebSocket set-model-and-conf message arrives.
              sed -i 's|let ResourcesPath="",ModelDir=\[\],ModelFileNames=\[\]|let ResourcesPath="/live2d-models/mao_pro/",ModelDir=["runtime"],ModelFileNames=["mao_pro"]|' \
                /workspace/home-aituber/frontend/assets/main-*.js 2>/dev/null || true
              echo "Default model globals set"

              # ── 6. Live2D model symlinks ──
              mkdir -p /workspace/home-aituber/live2d-models
              for model_dir in /workspace/home-aituber/live2d-models/*/; do
                model_name=$(basename "$model_dir")
                if [ -f "${model_dir}/runtime/${model_name}.model3.json" ] && [ ! -f "${model_dir}/${model_name}.model3.json" ]; then
                  ln -sf "runtime/${model_name}.model3.json" "${model_dir}/${model_name}.model3.json"
                fi
              done

              # ── 7. Install project deps ──
              cd /workspace/home-aituber
              uv sync

              # ── 8. Start server ──
              echo "Starting HomeAITuber Radio Server..."
              exec uv run --no-sync python run_server.py
          ports:
            - containerPort: 12393
              name: webui
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
                  optional: true
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: UV_PROJECT_ENVIRONMENT
              value: /tmp/venv
            - name: UV_LINK_MODE
              value: copy
          volumeMounts:
            - name: source
              mountPath: /workspace
            - name: config
              mountPath: /etc/homeaituber-config
              readOnly: true
            - name: venv
              mountPath: /tmp/venv
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "16Gi"
              cpu: "2"
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: homeaituber-source
        - name: config
          configMap:
            name: homeaituber-config
        - name: venv
          emptyDir:
            medium: Memory

---
# NodePort Service — externalアクセス用
apiVersion: v1
kind: Service
metadata:
  name: homeaituber
  namespace: agent-build
  labels:
    app: homeaituber
spec:
  type: NodePort
  selector:
    app: homeaituber
  ports:
    - name: webui
      port: 80
      targetPort: 12393
      nodePort: 30083

---
# PVC for source code (NAS-backed)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homeaituber-source
  namespace: agent-build
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-client
  resources:
    requests:
      storage: 10Gi
---
# RoleBinding: agents 名前空間の SA に agent-build へのアクセス権を付与
# 初回のみ: kubectl create namespace agent-build
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-homeaituber
  namespace: agent-build
subjects:
  - kind: ServiceAccount
    name: hermes-open-llm-vtuber
    namespace: agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
